$kind: http-request
name: Update Journal Entry
description: |-
  Updates an existing journal entry by its ID.

  Only non-null and non-empty fields in the request body will overwrite the existing values. The entry must exist in the database.

  **Path Variable:**
  - `myId` – The MongoDB ObjectId of the journal entry (use `{{entryId}}` from environment)

  **Request Body (partial update supported):**
  - `title` (string, optional) – New title
  - `content` (string, optional) – New content

  **Returns:** Updated JournalEntry object with status 200, or 404 if not found.
method: PUT
url: '{{baseUrl}}/journal/id/{{entryId}}'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Updated title",
      "content": "Updated content for this journal entry."
    }
