$kind: http-request
name: Get All Journal Entries
description: |-
  Retrieves all journal entries belonging to the currently authenticated user.

  **Returns:** Array of JournalEntry objects with status 200, or 404 if no entries exist.

  **JournalEntry schema:**
  ```json
  {
    "id": "string",
    "title": "string",
    "content": "string",
    "date": "2024-01-01T10:00:00",
    "sentiment": "HAPPY | SAD | ANGRY | ANXIOUS | NEUTRAL"
  }
  ```
method: GET
url: '{{baseUrl}}/journal'
order: 1000
