$kind: http-request
name: Get Journal Entry by ID
description: |-
  Retrieves a specific journal entry by its ID.

  The entry must belong to the authenticated user.

  **Path Variable:**
  - `myId` – The MongoDB ObjectId of the journal entry (use `{{entryId}}` from environment)

  **Returns:** JournalEntry object with status 200, or 404 if not found or not owned by the user.
method: GET
url: '{{baseUrl}}/journal/id/{{entryId}}'
order: 3000
