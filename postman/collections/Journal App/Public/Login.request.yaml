$kind: http-request
name: Login
description: |-
  Authenticate with username and password to receive a JWT token.

  **Request Body:**
  - `username` (string, required) – Your username
  - `password` (string, required) – Your password

  **Returns:** A JWT token string. Store this in the `jwt` environment variable to authenticate subsequent requests.

  **On failure:** Returns `"incorrect username or password"` with status 400.
method: POST
url: '{{baseUrl}}/public/login'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "john_doe",
      "password": "secret123"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      var jsonData = pm.response.text();
      if (pm.response.code === 200) {
          pm.environment.set("jwt", jsonData);
          console.log("JWT token saved to environment variable 'jwt'");
      }
