$kind: http-request
name: Greetings
description: |-
  Returns a greeting message with the current weather temperature for Pandharpur.

  Uses the authenticated user's name from the security context.

  **Returns:** `"Welcome {username} Weather feels like {temperature}"`

  **Requires:** JWT authentication (Bearer token).
method: GET
url: '{{baseUrl}}/public/greetings'
order: 4000
