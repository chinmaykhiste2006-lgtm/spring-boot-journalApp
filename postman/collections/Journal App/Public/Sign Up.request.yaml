$kind: http-request
name: Sign Up
description: |-
  Register a new user account.

  **Request Body:**
  - `username` (string, required) – Unique username
  - `password` (string, required) – User password
  - `email` (string, optional) – User email address
  - `sentimentAnalysis` (boolean, optional) – Enable sentiment analysis on journal entries

  **Returns:** The created User object.
method: POST
url: '{{baseUrl}}/public/signup'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "john_doe",
      "password": "secret123",
      "email": "john@example.com",
      "sentimentAnalysis": false
    }
