$kind: http-request
name: Greet by City
description: |-
  Returns a personalized greeting with the current "feels like" temperature for the specified city.

  Uses the WeatherStack API internally to fetch weather data.

  **Path Variable:**
  - `city` – Name of the city (use `{{city}}` from environment, default: `Mumbai`)

  **Returns:** `"Hi {username} weather feels like {feelsLike}°C"` with status 200.

  **On error:** Throws a RuntimeException with message `"some error occurred while greeting"`.
method: GET
url: '{{baseUrl}}/user/greetings/{{city}}'
order: 3000
