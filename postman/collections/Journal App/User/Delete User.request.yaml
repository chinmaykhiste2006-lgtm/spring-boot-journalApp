$kind: http-request
name: Delete User
description: |-
  Permanently deletes the currently authenticated user and all their journal entries.

  This operation is transactional — it deletes all associated journal entries first, then removes the user document from the database.

  **Warning:** This action is irreversible.

  **Returns:** Status 200 on success. Throws a RuntimeException if any error occurs during deletion.
method: DELETE
url: '{{baseUrl}}/user'
order: 2000
