$kind: http-request
name: Update User
description: |-
  Updates the profile of the currently authenticated user.

  Only provided (non-null) fields will be updated. If a new password is provided, it will be re-encoded before saving.

  **Request Body (all fields optional):**
  - `username` (string) – New username
  - `email` (string) – New email address
  - `password` (string) – New password (will be BCrypt encoded)
  - `sentimentAnalysis` (boolean) – Enable/disable sentiment analysis on new entries

  **Returns:** Updated User object.
method: PUT
url: '{{baseUrl}}/user'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "newemail@example.com",
      "sentimentAnalysis": true
    }
