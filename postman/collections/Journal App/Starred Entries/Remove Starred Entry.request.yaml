$kind: http-request
name: Remove Starred Entry
description: |-
  Removes a journal entry ID from the authenticated user's starred entries list.

  Uses `removeIf` to filter out the matching ID — safe to call even if the ID is not currently starred.

  **Path Variable:**
  - `id` – The MongoDB ObjectId of the journal entry to unstar (use `{{entryId}}` from environment)

  **Returns:** Status 200 with no body on success.
method: DELETE
url: '{{baseUrl}}/star/delete/id/{{entryId}}'
order: 3000
