$kind: http-request
name: Add Starred Entry
description: |-
  Adds a journal entry ID to the authenticated user's starred entries list.

  **Path Variable:**
  - `id` – The MongoDB ObjectId of the journal entry to star (use `{{entryId}}` from environment)

  **Returns:** Status 200 with no body on success.
method: POST
url: '{{baseUrl}}/star/add/id/{{entryId}}'
order: 2000
