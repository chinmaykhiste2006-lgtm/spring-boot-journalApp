$kind: http-request
name: Get All Users
description: |-
  Retrieves a list of all registered users in the system.

  **Requires:** ROLE_ADMIN authority.

  **Returns:** Array of User objects with status 200, or 404 if no users exist.

  **User schema:**
  ```json
  {
    "id": "string",
    "username": "string",
    "email": "string",
    "sentimentAnalysis": true,
    "roles": ["ROLE_USER", "ROLE_ADMIN"],
    "journalEntries": [],
    "starredEntries": []
  }
  ```
method: GET
url: '{{baseUrl}}/admin/all-users'
order: 1000
