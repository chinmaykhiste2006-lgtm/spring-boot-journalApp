$kind: http-request
name: Create Admin User
description: |-
  Creates a new user with admin privileges (ROLE_ADMIN).

  **Requires:** ROLE_ADMIN authority.

  **Request Body:**
  - `username` (string, required) – Unique username for the admin
  - `password` (string, required) – Password (will be BCrypt encoded)
  - `email` (string, optional) – Admin email address
  - `roles` (array, optional) – Roles list; `saveAdmin` will assign ROLE_ADMIN automatically

  **Returns:** Status 200 with no body.
method: POST
url: '{{baseUrl}}/admin/create-admin-user'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "admin_user",
      "password": "adminpass123",
      "email": "admin@example.com"
    }
