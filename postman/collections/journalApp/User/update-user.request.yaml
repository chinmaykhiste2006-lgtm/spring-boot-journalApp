$kind: http-request
name: Update User
description: 'Update the authenticated user''s profile. Fields: username, email, password (optional), sentimentAnalysis (boolean). Only provided fields are updated.'
method: PUT
url: '{{baseUrl}}/user'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{jwt}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "new_username",
      "email": "newemail@example.com",
      "password": "newpassword123",
      "sentimentAnalysis": true
    }
