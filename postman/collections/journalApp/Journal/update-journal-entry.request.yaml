$kind: http-request
name: Update Journal Entry
description: 'Update an existing journal entry by ID. Only non-null, non-empty fields will be updated.'
method: PUT
url: '{{baseUrl}}/journal/id/{{entryId}}'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{jwt}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Updated Title",
      "content": "Updated content for this entry."
    }
