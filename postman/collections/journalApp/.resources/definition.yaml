$kind: collection
name: journalApp
description: 'A Spring Boot journaling application API. Supports user registration, JWT-based authentication, journal entry CRUD, starred entries, and admin management. Set https://8080
 and {{jwt}} variables before use.'
variables:
  - key: baseUrl
    value: 'http://localhost:8080'
    description: 'Base URL of the journalApp Spring Boot server'
  - key: jwt
    value: ''
    description: 'JWT Bearer token obtained from the Login endpoint'
  - key: entryId
    value: ''
    description: 'MongoDB ObjectId of a journal entry'
  - key: city
    value: 'Mumbai'
    description: 'City name for weather-based greeting (e.g., Mumbai, London)'