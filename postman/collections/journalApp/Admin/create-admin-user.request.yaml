$kind: http-request
name: Create Admin User
description: 'Create a new admin user. Requires ADMIN role.'
method: POST
url: '{{baseUrl}}/admin/create-admin-user'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{jwt}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "admin_user",
      "password": "adminpass123",
      "email": "admin@example.com",
      "roles": ["ROLE_ADMIN", "ROLE_USER"]
    }
