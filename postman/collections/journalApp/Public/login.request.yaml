$kind: http-request
name: Login
description: 'Authenticate and receive a JWT token. Use the returned token as a Bearer token in the Authorization header for protected endpoints.'
method: POST
url: '{{baseUrl}}/public/login'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "john_doe",
      "password": "secret123"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      if (pm.response.code === 200) {
          const token = pm.response.text();
          pm.environment.set("jwt", token);
          console.log("JWT token saved to environment variable 'jwt'");
      }